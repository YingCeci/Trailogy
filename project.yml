name: HikeCompanion

options:
  bundleIdPrefix: com.lijuncheng16
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  # KokoroSwift VENDORED into external/ — upstream tag 1.0.11 hard-pins
  # mlx-swift exact: "0.30.2", which conflicts with mlx-swift-lm 3.x's
  # required MLX 0.31+. Our copy relaxes that pin to a range so both can
  # coexist on MLX 0.31. See external/kokoro-ios/Package.swift comment.
  KokoroSwift:
    path: external/kokoro-ios
  # MLXUtilsLibrary VENDORED — same reason as KokoroSwift, and so the whole
  # dep graph references a single path-based instance.
  MLXUtilsLibrary:
    path: external/MLXUtilsLibrary
  # Gemma 4 LLM via MLX. Same MLX runtime as Kokoro = unified memory pool.
  mlx-swift-lm:
    path: external/mlx-swift-lm
  # HuggingFace Hub client + tokenizers — used by mlx-swift-lm's
  # `#huggingFaceTokenizerLoader()` macro to load tokenizer.json from the
  # bundled model directory.
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    minVersion: "1.3.0"
    maxVersion: "2.0.0"
  # swift-huggingface provides the `HuggingFace` module used by
  # mlx-swift-lm's tokenizer-loader macro. Pulled transitively by
  # swift-transformers/Hub already, but we need it as a direct dep so
  # we can `import HuggingFace` from our Swift code.
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    minVersion: "0.8.1"
    maxVersion: "1.0.0"
  # swift-embeddings provides the on-device embedding model (MiniLM
  # via MLTensor) for the Phase 4 RAG path. Auto-routes to ANE/GPU/CPU.
  # Pre-1.0 dep — pinned tight; expect occasional API churn on bumps.
  # MIT license. See ADR-001-rag-architecture for design rationale.
  swift-embeddings:
    url: https://github.com/jkrukowski/swift-embeddings
    minVersion: "0.0.16"
    maxVersion: "0.1.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  HikeCompanion:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: HikeCompanion
        excludes:
          - "Resources/Models/**"
          - "Resources/RAG/**"
      # Models dir as a "blue folder" reference — preserves directory tree
      # in the .app bundle so Kokoro and Gemma files end up in separate
      # subdirectories. Critical because mlx-swift-lm globs `*.safetensors`
      # from the model directory; without the split, it would pick up
      # Kokoro's weights and crash with "Unhandled keys [bert, decoder, …]".
      - path: HikeCompanion/Resources/Models
        type: folder
      # RAG corpus + precomputed embeddings as a blue-folder reference so
      # the directory survives intact in the .app bundle (RAGService.swift
      # looks up files via Bundle.main.url(... subdirectory: "RAG")). The
      # full corpus is tiny (~150 KB across 4 subjects × {jsonl, embeddings.f16}
      # at PoC scale), bundle-friendly without any download flow.
      - path: HikeCompanion/Resources/RAG
        type: folder
    dependencies:
      # KokoroSwift is built as a dynamic .framework — must be embedded in
      # the .app or dyld aborts at launch with __abort_with_payload.
      - package: KokoroSwift
        product: KokoroSwift
        embed: true
        codeSign: true
      # MLXUtilsLibrary: linked directly (we use NpyzReader from our code),
      # but NOT explicitly embedded — Xcode auto-embeds it transitively
      # via KokoroSwift, and explicitly listing it as embed:true causes
      # "Unexpected duplicate tasks" at copy phase.
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
        embed: false
      # Gemma 4 stack via mlx-swift-lm.
      # MLXLLM = text-only loader, smaller MLX active footprint.
      # MLXVLM = vision-language loader, used when the user attached a
      # photo to their question (Phase 3b). GemmaService dispatches per
      # turn so text-only Asks don't pay vision-tower memory.
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      # swift-transformers: Tokenizers + Hub.
      - package: swift-transformers
        product: Tokenizers
      - package: swift-transformers
        product: Hub
      # swift-huggingface: provides `HuggingFace` module used by the
      # tokenizer-loader macro expansion. Pulled transitively via
      # swift-transformers/Hub but listed directly so we can import it.
      - package: swift-huggingface
        product: HuggingFace
      # swift-embeddings: BERT/MiniLM-style embedders via MLTensor.
      # `Embeddings` is the main API (Bert.loadModelBundle, encode);
      # `MLTensorUtils` provides cosineDistance and small helpers.
      - package: swift-embeddings
        product: Embeddings
      - package: swift-embeddings
        product: MLTensorUtils
    # Increased Memory Limit entitlement (Phase 3b VLM).
    # Without this the iPhone foreground app footprint cap is ~3.5–4 GB
    # before iOS jetsam kills the process. Gemma 4 VLM resident is
    # ~2.78 GB MLX active and the prefill eval adds ~300 MB transient,
    # which puts us right on the line. The entitlement raises the
    # threshold to ~6 GB on iPhone Pro models. Available on both free
    # and paid Apple Developer accounts; xcodegen auto-creates the
    # .entitlements file at the path below if missing.
    entitlements:
      path: HikeCompanion/HikeCompanion.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    info:
      path: HikeCompanion/Info.plist
      properties:
        # Product is "Trailogy" (display name); target/bundle id keep
        # the legacy "HikeCompanion" identifier so we don't churn the
        # Xcode target, scheme, or App Store provisioning.
        CFBundleDisplayName: Trailogy
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBg
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Phase 2: voice input. Both required by SFSpeechRecognizer on iOS.
        NSMicrophoneUsageDescription: "Trailogy uses the microphone to hear your questions about the trail."
        NSSpeechRecognitionUsageDescription: "Trailogy converts your spoken questions into text for the assistant. All recognition happens on-device."
        # Phase 3a: camera capture for "what is this?" follow-ups.
        NSCameraUsageDescription: "Trailogy uses the camera so you can show what you're looking at when you ask a question."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lijuncheng16.HikeCompanion
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

# Explicit shared scheme — xcodegen's auto-scheme-for-app-target stopped
# working at some point and the dropdown only shows the SPM library
# schemes, leaving no way to run the app from ⌘R. Declaring the scheme
# here pins it to xcshareddata so it's stable and committed.
schemes:
  HikeCompanion:
    build:
      targets:
        HikeCompanion: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
