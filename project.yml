name: HikeCompanion

options:
  bundleIdPrefix: com.lijuncheng16
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  KokoroPipeline:
    path: external/kokoro-coreml/swift

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  HikeCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HikeCompanion
        excludes:
          - "Resources/Models/**"   # included via folder reference below
      # Models dir is included as a folder reference (blue folder) so Xcode
      # copies the .mlpackage trees verbatim into the .app bundle without
      # pre-compiling them. KokoroPipeline compiles them at runtime.
      - path: HikeCompanion/Resources/Models
        type: folder
        buildPhase: resources
    dependencies:
      - package: KokoroPipeline
        product: KokoroPipeline
    info:
      path: HikeCompanion/Info.plist
      properties:
        CFBundleDisplayName: HikeCompanion
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lijuncheng16.HikeCompanion
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
