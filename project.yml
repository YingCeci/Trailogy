name: HikeCompanion

options:
  bundleIdPrefix: com.lijuncheng16
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  # NOTE: KokoroSwift 1.0.7–1.0.10 had a Package.swift bug where the source
  # imports MLXFast but the manifest doesn't declare it as a dependency.
  # Fixed in 1.0.11 — pin to that or newer.
  KokoroSwift:
    url: https://github.com/mlalma/kokoro-ios
    minVersion: "1.0.11"
    maxVersion: "2.0.0"
  # We use NpyzReader from MLXUtilsLibrary directly to load voices.npz, so
  # we need it as a direct dep (transitive-via-KokoroSwift isn't enough
  # for our target's link step).
  MLXUtilsLibrary:
    url: https://github.com/mlalma/MLXUtilsLibrary.git
    minVersion: "0.0.5"
    maxVersion: "1.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  HikeCompanion:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: HikeCompanion
        excludes:
          - "Resources/Models/README.md"
    dependencies:
      # KokoroSwift is built as a dynamic .framework — must be embedded in
      # the .app or dyld aborts at launch with __abort_with_payload.
      - package: KokoroSwift
        product: KokoroSwift
        embed: true
        codeSign: true
      # MLXUtilsLibrary: linked directly (we use NpyzReader from our code),
      # but NOT explicitly embedded — Xcode auto-embeds it transitively
      # via KokoroSwift, and explicitly listing it as embed:true causes
      # "Unexpected duplicate tasks" at copy phase.
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
        embed: false
    info:
      path: HikeCompanion/Info.plist
      properties:
        CFBundleDisplayName: HikeCompanion
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lijuncheng16.HikeCompanion
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
