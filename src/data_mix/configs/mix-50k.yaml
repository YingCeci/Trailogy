# data_mix/configs/mix-50k.yaml
#
# Default 50K-row mix for Trailogy v2.0. Species-ID bucket is **NA-trees**
# (locally fetched from iNaturalist around the supported trail set —
# see src/data_mix/scripts/na_tree_fetch.py). PlantNet is intentionally
# absent: the v1.0 PlantNet-50k corpus has almost no North-American
# trees and so under-represents the species users actually see on the
# Trailogy trails. The PlantNet-backed recipe is preserved at
# mix-50k-plantnet.yaml for benchmark comparison.
#
# Bucket ratios (approximate; na_trees is oversampled from a ~440-row
# source pool so each "row" is really a re-shuffle of the underlying
# images across epochs):
#
#   na_trees      45%   22,500 train   1,125 val
#   llava         30%   15,000 train     750 val
#   smoltalk      15%    7,500 train     375 val
#   negative      10%    5,000 train     250 val
#   offline_qa    out-of-ratio (~38 train / 4 val, whole corpus)
#
# Total: ~50,038 train rows. The "50k" label is a round-number tag;
# the bucket targets sum to 50,000.
#
# na_trees source: produced by
#   1. src/data_mix/scripts/na_tree_fetch.py  (downloads images +
#      writes per-split JSONLs to $NA_TREES_ROOT/{train,val,test}.jsonl)
#   2. src/data_mix/src/prepare_na_trees.py   (re-runs the species
#      description join + 960x672 resize so the JSONL matches the
#      finetune schema; produces train/val/test JSONLs under its own
#      --output_dir)
#
# Either output layout works as long as the JSONL paths below resolve.
# Paths are interpreted relative to the repo root when not absolute.
#
# PlantNet bucket is OMITTED (no ``plant:`` block). mix.py treats this
# as plant_train=plant_val=0 and skips the PlantNet sampler entirely.

seed: 42
source: llava

na_trees:
  train: 22500
  val:   1125
  train_jsonl: "src/finetune/data/na_trees/train.jsonl"
  val_jsonl:   "src/finetune/data/na_trees/val.jsonl"

llava:
  train: 15000
  val:   750

smoltalk:
  train: 7500
  val:   375

negative:
  train: 5000
  val:   250

# v3: tiny persona bucket, same path/val_ratio convention as the
# PlantNet-backed mixes. Whole corpus included once; no oversample.
offline_qa:
  path: "assets/data_offline_qa/offline_qa.json"
  val_ratio: 0.1
