# data_mix/configs/mix-200-llava-plantnet.yaml
#
# Smoke-test config for the PlantNet-backed v2 pipeline (LLaVA source).
# Same bucket ratios as the production v2 mixes (45/30/15/10), tiny
# totals so the full pipeline (PlantNet read, LLaVA streaming,
# smoltalk streaming, image resize, multi val partition, build_report)
# runs in seconds.
#
# Use this to validate path resolution, HF auth, and storage layout
# before launching mix-50k-plantnet or mix-100k-plantnet.
seed: 42
source: llava

plant:
  train: 90
  val:   5
  per_class_cap: 5

llava:
  train: 60
  val:   3

smoltalk:
  train: 30
  val:   2

negative:
  train: 20
  val:   1
